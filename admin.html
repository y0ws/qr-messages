<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { min-height: 100vh; background: #fdf6f0; font-family: 'Tajawal', sans-serif; padding: 24px; }

  #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .login-card { background: #fff; border-radius: 24px; padding: 40px 32px; max-width: 340px; width: 100%; box-shadow: 0 4px 40px rgba(0,0,0,0.08); text-align: center; }
  .login-card h2 { color: #3d2b1f; margin-bottom: 24px; font-size: 20px; }
  .login-card input { width: 100%; padding: 12px 16px; border: 1px solid #e8d5c8; border-radius: 12px; font-size: 15px; font-family: 'Tajawal', sans-serif; margin-bottom: 16px; outline: none; text-align: center; letter-spacing: 2px; }
  .login-card button { width: 100%; padding: 12px; background: #3d2b1f; color: #fff; border: none; border-radius: 12px; font-size: 15px; cursor: pointer; font-family: 'Tajawal', sans-serif; }
  .error { color: #c0392b; font-size: 13px; margin-top: 10px; }

  #admin-screen { display: none; max-width: 1400px; margin: 0 auto; }
  h1 { color: #3d2b1f; font-size: 22px; margin-bottom: 24px; text-align: center; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
  .card { background: #fff; border-radius: 20px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); display: flex; flex-direction: column; }
  .card-name { font-size: 17px; font-weight: 700; color: #3d2b1f; margin-bottom: 12px; text-align: center; border-bottom: 1px solid #f0e0d6; padding-bottom: 10px; }
  .card-msg { font-size: 13px; color: #5a3e35; line-height: 1.7; margin-bottom: 14px; white-space: pre-wrap; flex-grow: 1; }
  .card-id { font-size: 11px; color: #c9a899; margin-bottom: 10px; direction: ltr; text-align: center; word-break: break-all; }
  .qr-wrap { display: flex; justify-content: center; margin-bottom: 12px; }
  .qr-label { text-align: center; font-size: 14px; font-weight: 700; color: #3d2b1f; margin-bottom: 12px; line-height: 1.8; }
  .qr-label span { font-size: 12px; color: #b08d7a; font-weight: 400; }
  .dl-btn { width: 100%; padding: 10px; background: #fdf6f0; color: #3d2b1f; border: 1px solid #e8d5c8; border-radius: 10px; font-size: 13px; cursor: pointer; font-family: 'Tajawal', sans-serif; }
  .dl-btn:hover { background: #f5e6da; }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <h2>🔒 صفحة الإدارة</h2>
    <input type="password" id="pass" placeholder="كلمة السر" onkeydown="if(event.key==='Enter')login()">
    <button onclick="login()">دخول</button>
    <div class="error" id="err"></div>
  </div>
</div>

<div id="admin-screen">
  <h1>💌 كل الرسايل</h1>
  <div class="grid" id="grid"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
<script>
const BASE = "https://y0ws.github.io/qr-messages/?id=";
const PASSWORD = "k9#mQ2$x";

function login() {
  if (document.getElementById("pass").value === PASSWORD) {
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("admin-screen").style.display = "block";
    loadMessages();
  } else {
    document.getElementById("err").textContent = "كلمة السر غلط";
  }
}

function loadMessages() {
  fetch('messages.json')
    .then(r => r.json())
    .then(data => renderCards(data));
}

function renderCards(messages) {
  const grid = document.getElementById("grid");
  Object.entries(messages).forEach(([id, msg]) => {
    const card = document.createElement("div");
    card.className = "card";
    const url = BASE + id;
    card.innerHTML = `
      <div class="card-name">${msg.to}</div>
      <div class="card-msg"></div>
      <div class="card-id">${url}</div>
      <div class="qr-wrap"><canvas id="qr-${id}"></canvas></div>
      <div class="qr-label">${msg.to}<br><span>لديكِ رسالة خاصة 💌</span></div>
      <button class="dl-btn" onclick="dlQR('${id}')">تحميل QR</button>
    `;
    card.querySelector('.card-msg').textContent = msg.text;
    grid.appendChild(card);
    new QRious({ element: document.getElementById("qr-" + id), value: url, size: 160, level: "M" });
  });
}

function dlQR(id) {
  const a = document.createElement("a");
  a.href = document.getElementById("qr-" + id).toDataURL("image/png");
  a.download = "qr-" + id + ".png";
  a.click();
}
</script>
</body>
</html>
