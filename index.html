<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #fdf6f0; gap: 20px; padding: 24px; box-sizing: border-box; }
  canvas { border-radius: 12px; background: #fff; padding: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
  p { color: #b08d7a; font-size: 14px; direction: rtl; text-align: center; }
  button { padding: 10px 24px; background: #3d2b1f; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
</style>
</head>
<body>
<canvas id="qr"></canvas>
<p>رسالة عاشه مبارك — من كلثم</p>
<button onclick="downloadQR()">تحميل QR</button>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
<script>
new QRious({
  element: document.getElementById("qr"),
  value: "https://y0ws.github.io/qr-messages/?id=ashe",
  size: 256,
  level: "M"
});
function downloadQR() {
  const a = document.createElement("a");
  a.href = document.getElementById("qr").toDataURL("image/png");
  a.download = "qr-ashe.png";
  a.click();
}
</script>
</body>
</html>
