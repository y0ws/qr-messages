<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رسالة</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #fdf6f0; font-family: 'Tajawal', sans-serif; padding: 24px; }
  .card { background: #fff; border-radius: 24px; padding: 40px 32px; max-width: 420px; width: 100%; box-shadow: 0 4px 40px rgba(0,0,0,0.08); text-align: center; }
  .icon { font-size: 48px; margin-bottom: 16px; }
  .from { font-size: 13px; color: #b08d7a; letter-spacing: 1px; margin-bottom: 8px; font-weight: 500; }
  .to { font-size: 22px; font-weight: 700; color: #3d2b1f; margin-bottom: 28px; }
  .divider { width: 40px; height: 2px; background: #f0c4a8; margin: 0 auto 28px; border-radius: 2px; }
  .message { font-size: 17px; color: #5a3e35; line-height: 2; white-space: pre-wrap; }
  .footer { margin-top: 32px; font-size: 12px; color: #c9a899; }
</style>
</head>
<body>
<div class="card" id="card">
  <div class="icon">🤍</div>
  <div class="from">من كلثم</div>
  <div class="to" id="to"></div>
  <div class="divider"></div>
  <div class="message" id="message"></div>
  <div class="footer">💌 رسالة خاصة</div>
</div>
<script>
const id = new URLSearchParams(window.location.search).get("id");
const card = document.getElementById("card");

if (!id) {
  card.style.display = 'none';
} else {
  fetch('messages.json')
    .then(r => r.json())
    .then(data => {
      const msg = data[id];
      if (msg) {
        document.getElementById("to").textContent = msg.to;
        document.getElementById("message").textContent = msg.text;
      } else {
        card.style.display = 'none';
      }
    })
    .catch(() => { card.style.display = 'none'; });
}
</script>
</body>
</html>
